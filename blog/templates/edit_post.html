{% extends 'base.html' %}

{% block content %}

<h2>Edit Post</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="title" value="{{ post.title }}" class="form-control" required>
    <br>

    <textarea name="content" class="form-control" rows="5">{{ post.content }}</textarea>
    <br>

    <button class="btn btn-warning">Update</button>
</form>

{% endblock %}
